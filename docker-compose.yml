services:
  web:
    container_name: datacore-ui
    image: datacore-ui:latest
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - "${APP_PORT:-3001}:3000"
    volumes:
      - ./prisma/sqlite:/app/prisma/sqlite
      - ./secrets:/app/secrets
    environment:
      - DATABASE_URL=file:./sqlite/dev.db
      - PORT=3000
    restart: unless-stopped
